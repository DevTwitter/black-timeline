name: Generate Timeline Data

on:
  push:
    paths:
      - 'README.md'
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: node scripts/parse-readme.js

      - name: Commit generated file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/timeline.ts
          git diff --staged --quiet || git commit -m "chore: regenerate timeline data"
          git push
